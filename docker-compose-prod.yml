
services:
  red-tetris:
    container_name: red-tetris-prod
    build: .
    ports:
      - "${PORT}:${PORT}"
    networks:
      - red-tetris
    environment:
      - NODE_ENV=Production
      - PORT=${PORT}
      - IP_ADDRESS=${IP_ADDRESS}
      - VITE_SERVER_URL=${VITE_SERVER_URL}

networks:
  red-tetris:
    driver: bridge
